# Paprika multi-hub scale-out — SKELETON, NOT ENABLED.
#
# Brings up nginx + 3 hub replicas (hub-a/b/c) sharing one Redis. This
# is the *foundation* target; do NOT switch production to it until:
#   1. Hub→Hub forwarding (control-plane phase 3) is implemented, AND
#   2. assets live on shared object storage (phase 2 / MinIO).
# Without (1) a /sessions/* request that lands on a non-owner hub fails
# ("session worker ... is no longer connected"). Without (2) each hub
# writes assets to its own local disk and the others 404 them.
#
# What already works at the foundation level (this repo, today):
#   * each replica gets a distinct hub_id (= its env HUB_ID below)
#   * the registry records WS ownership in Redis (paprika:worker:*:owner)
#   * the Session Map is mirrored to Redis (paprika:session:*)
# i.e. the data needed by the forwarding layer is being written.
#
# Run (when ready):  docker compose -f deploy/scale/docker-compose.scale.yml up -d --build
#
# This file intentionally carries only the env each hub MUST have to
# boot + talk to Redis. Copy the full environment block from the root
# docker-compose.yml (CODEGEN_*, PAPRIKA_*, SEARXNG_*, …) into the
# x-hub-common anchor before any real use.

x-hub-common: &hub-common
  build:
    context: ../..
    dockerfile: docker/hub/Dockerfile
  restart: unless-stopped
  depends_on: [redis]
  privileged: true
  volumes:
    - paprika-data:/data/jobs          # NOTE: local volume — replace with
                                        # shared object storage (phase 2)
                                        # before multi-hub asset serving.
    - ../../server:/app/server
    - ../../core:/app/core
    - ../../VERSION:/app/VERSION:ro
    - ../../data/tools:/data/tools
    - /var/run/docker.sock:/var/run/docker.sock:rw
  # PUBLIC_BASE_URL points workers at nginx, not at an individual hub.
  command: >
    python -m server --mode hub
    --host 0.0.0.0 --port 8000
    --redis-url redis://redis:6379
    --data-dir /data/jobs
    --public-base-url ${PUBLIC_BASE_URL:-http://nginx:8000}

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # For real 200-worker use, front this with Sentinel / a managed
    # Redis (control-plane phase 4) — a single redis is the new SPOF.
    volumes:
      - paprika-redis:/data

  hub-a:
    <<: *hub-common
    environment:
      - PYTHONUNBUFFERED=1
      - HUB_ID=hub-a
  hub-b:
    <<: *hub-common
    environment:
      - PYTHONUNBUFFERED=1
      - HUB_ID=hub-b
  hub-c:
    <<: *hub-common
    environment:
      - PYTHONUNBUFFERED=1
      - HUB_ID=hub-c

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [hub-a, hub-b, hub-c]
    ports:
      - "8000:8000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  paprika-data:
  paprika-redis:
